version: '3.8'

services:
  pgvector:
    image: pgvector/pgvector:pg16-bookworm
    env_file:
      - ../.env
    ports:
      - "5432:5432"
    restart: always
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    networks:
      - back-end
  
  backend:
    build: 
      context: ..
      dockerfile: app/Dockerfile
    container_name: fastapi_application
    env_file:
      - ../.env
    ports:
      - '8000:8000'
    restart: "no"
    networks:
      - front-end
      - back-end
    depends_on:
     - pgvector
  
  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    container_name: streamlit_application
    env_file:
      - ../.env
    ports:
      - '8501:8501'
    networks:
      - front-end
    depends_on:
      - backend
  

volumes:
  pgvector_data:

networks:
  back-end:
  front-end: