version: '3.8'

services:
  pgvector:
    image: pgvector/pgvector:pg16-bookworm
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin_password
      - POSTGRES_DB=documind_db
    ports:
      - "5432:5432"
    restart: always
    volumes:
      - pgvector_data:/var/lib/postgresql/data
volumes:
  pgvector_data:
